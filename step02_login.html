<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="style.css">
<style>body{background:#F5F3EE}.screen{background:#F5F3EE}</style>
</head><body><div class="screen" style="background:#F5F3EE">
<div class="header"><img src="../../QNB_Logo_RGB.png" style="height:120px"><div style="font-size:26px;font-weight:400;color:#8C8C8C;max-width:900px;text-align:right">Please insert your card or tap the screen for cardless transactions.</div></div>
<div style="position:absolute;top:160px;bottom:160px;left:0;right:0;display:flex">
  <div style="width:960px;display:flex;flex-direction:column;align-items:center;justify-content:center"><div style="position:relative;width:800px;height:500px;border-radius:16px">
  <img src="../../Kuan2-reader.png" style="width:800px;height:500px;object-fit:cover;display:block"/>
  <svg style="position:absolute;top:378px;left:191px;z-index:2" width="46" height="56" viewBox="0 0 46 56">
    <style>
      .ca1{animation:ca .9s ease-in-out infinite}
      .ca2{animation:ca .9s ease-in-out -.3s infinite}
      .ca3{animation:ca .9s ease-in-out -.6s infinite}
      @keyframes ca{0%,100%{opacity:.25}50%{opacity:1}}
    </style>
    <polyline class="ca3" points="4,44 23,28 42,44" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline class="ca2" points="4,30 23,14 42,30" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline class="ca1" points="4,16 23,0 42,16" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <div style="position:absolute;top:435px;left:155px;width:108px;height:170px;
    background:#1B1464;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,0.75);
    display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2">
    <div style="position:absolute;top:10px;left:12px;font-size:13px;font-weight:700;color:rgba(255,255,255,0.9)">QNB</div>
    <div style="position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:600;color:rgba(200,205,230,0.5);letter-spacing:2px">RFID</div>
    <svg width="80" height="52" viewBox="0 0 260 160" fill="none">
      <circle cx="60" cy="80" r="9" fill="white"/>
      <path d="M79,55 A33,33 0 0,1 79,105" stroke="white" stroke-width="7" stroke-linecap="round"/>
      <path d="M102,38 A57,57 0 0,1 102,122" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.6"/>
      <path d="M125,22 A81,81 0 0,1 125,138" stroke="white" stroke-width="7" stroke-linecap="round" opacity="0.3"/>
    </svg>
  </div>
</div></div>
  <div style="width:2px;background:#E2DDD6;margin:60px 0"></div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px">
    <div style="text-align:center">
      <div style="font-size:52px;font-weight:700;color:#1B1464;line-height:1.3">Please insert the card<br>in the reader</div>
      <div style="font-size:36px;font-weight:400;color:#5A5A7A;margin-top:24px">or use the Log in button</div>
      <div style="font-size:28px;font-weight:400;color:#8C8C8C;margin-top:10px">to enter with username <span class='font-fallback'>&amp;</span> password</div>
    </div>
    <button class="btn btn-secondary btn-login" style="width:540px;margin-top:20px">Log in</button>
  </div>
</div>
<div class="footer"><div style="width:380px"></div><div style="width:380px"></div></div></div></body></html>
